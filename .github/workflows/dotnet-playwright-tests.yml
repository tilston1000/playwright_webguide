name: .NET Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore PlaywrightTests/PlaywrightTests.csproj

      - name: Build
        run: dotnet build PlaywrightTests/PlaywrightTests.csproj --configuration Release --no-restore

      - name: Install Playwright browsers
        run: pwsh PlaywrightTests/bin/Release/net9.0/playwright.ps1 install --with-deps

      - name: Test
        run: dotnet test PlaywrightTests/PlaywrightTests.csproj --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/*.trx
            PlaywrightTests/TestResults/**

      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: PlaywrightTests/bin/**/playwright-traces/**/*.zip
          if-no-files-found: ignore
